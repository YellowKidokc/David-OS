services:
  top-of-mind-api:
    image: top-of-mind-api:local
    container_name: top-of-mind-api
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      FIHUB_API_TOKEN: ${FIHUB_API_TOKEN}
      FIHUB_DB_PATH: "/data/top-of-mind.sqlite3"
    volumes:
      - /volume1/docker/david-os/data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10000/openapi.json', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
