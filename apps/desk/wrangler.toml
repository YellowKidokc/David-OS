# Cloudflare Workers static-assets config for the Top of Mind desk (Vite/React).
# The Vite build outputs to ./dist; wrangler serves that as static files.
# IMPORTANT: the build must run BEFORE deploy — set the Cloudflare build command to
#   npm install && npm run build
# and the deploy command to
#   npx wrangler deploy
name = "top-of-mind-desk"
compatibility_date = "2026-07-03"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
